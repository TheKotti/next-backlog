name: Playwright Tests
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # runs daily at 00:00

jobs:
  check-commits:
    runs-on: ubuntu-latest
    outputs:
      has_new_commits: ${{ steps.check.outputs.has_new_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # required to read git log history
      - id: check
        run: |
          COUNT=$(git log --oneline --since '24 hours ago' origin/main | wc -l)
          echo "has_new_commits=$([ $COUNT -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

  test:
    needs: check-commits
    if: needs.check-commits.outputs.has_new_commits == 'true' || github.event_name == 'workflow_dispatch'
    environment: Preview
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Setup mongodb-tools
      run: |
        wget https://fastdl.mongodb.org/tools/db/mongodb-database-tools-ubuntu2204-x86_64-100.6.1.deb
        sudo apt install ./mongodb-database-tools-*-100.6.1.deb
        mongorestore --version

    - name: Seed MongoDB
      run: |
        mongoimport --db test_db --collection games --drop --file tests/seed.json --jsonArray

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Build app
      run: npm run build
      env:
        MONGODB_URI: mongodb://localhost:27017
        DB_NAME: test_db
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        AUTH_TRUST_HOST: ${{ secrets.AUTH_TRUST_HOST }}
        APP_URL: ${{ secrets.APP_URL }}
        ADMIN_USER_NAME: ${{ secrets.ADMIN_USER_NAME }}

    - name: Run app
      run: npm run start & npx wait-on http://localhost:3000
      env:
        MONGODB_URI: mongodb://localhost:27017
        DB_NAME: test_db
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        AUTH_TRUST_HOST: ${{ secrets.AUTH_TRUST_HOST }}
        APP_URL: ${{ secrets.APP_URL }}
        ADMIN_USER_NAME: ${{ secrets.ADMIN_USER_NAME }}

    - name: Run Playwright tests
      run: npx playwright test
      env:
        MONGODB_URI: mongodb://localhost:27017
        DB_NAME: test_db
        NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
        NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        AUTH_TRUST_HOST: ${{ secrets.AUTH_TRUST_HOST }}
        APP_URL: ${{ secrets.APP_URL }}
        ADMIN_USER_NAME: ${{ secrets.ADMIN_USER_NAME }}

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
